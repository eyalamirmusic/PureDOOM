# Builds the engine and runs the test suite on the three desktop platforms.
#
# The eacp app is deliberately NOT built here. It needs a GPU, and it tracks a
# local eacp branch rather than eacp's main (see CLAUDE.md). What CI can check is
# the thing that matters most through the C++ refactor: that the simulation, and
# the frames the renderer draws of it, still match their goldens - everywhere,
# not just on the machine that recorded them.
name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    types: [ opened, synchronize ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    name: Tests ${{ matrix.os }}, ${{ matrix.c_compiler }}

    strategy:
      fail-fast: false

      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        build_type: [ Release ]
        c_compiler: [ gcc, clang, cl ]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DPUREDOOM_BUILD_TESTS=ON
          -DPUREDOOM_BUILD_EACP_EXAMPLE=OFF
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}
